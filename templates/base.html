<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>C.O.E.N. - Web</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-3">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">C.O.E.N     </a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" href="/articulos">Articulos</a></li>
            <li class="nav-item"><a class="nav-link" href="/eventos">Eventos</a></li>
            <li class="nav-item"><a class="nav-link" href="/compras">Compras</a></li>
            <li class="nav-item"><a class="nav-link" href="/tesoreria">Tesoreria</a></li>
            <li class="nav-item"><a class="nav-link" href="/comidas">Comidas</a></li>
            <li class="nav-item"><a class="nav-link" href="/gastos">Gastos</a></li>
            <li class="nav-item"><a class="nav-link" href="/pagos">Pagos</a></li>
          </ul>
        </div>
      </div>
	    
    </nav>
	

    <div class="container">
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          {% for msg in messages %}
            <div class="alert alert-success">{{ msg }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
