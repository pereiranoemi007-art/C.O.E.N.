{% extends 'base.html' %}
{% block content %}
<h1>Gastos Generales</h1>
<form method="post" action="/gastos/add">
  <div class="mb-3">
    <label class="form-label">Descripción</label>
    <input class="form-control" name="descripcion">
  </div>
  <button class="btn btn-primary">Agregar Gasto</button>
</form>
<hr>
<h2>Gastos existentes</h2>
<table class="table">
  <thead><tr><th>ID</th><th>Descripción</th><th>Acciones</th></tr></thead>
  <tbody>
    {% for g in gastos %}
    <tr>
      <td>{{ g.id }}</td>
      <td>{{ g.descripcion or g.nombre }}</td>
      <td>
        <a href="/gastos/{{ g.id }}" class="btn btn-sm btn-primary">Detalle</a>
        <a href="/gastos/delete/{{ g.id }}" class="btn btn-sm btn-danger">Eliminar</a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
